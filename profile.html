<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติส่วนตัว | อัษฎา ปาคำวัง</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6d28d9,#7c3aed,#8b5cf6);
    padding:40px;
}

.card{
    width:850px;
    max-width:100%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 0 25px #c084fc;
    margin-bottom:20px;
}

h1{
    color:white;
    font-size:40px;
}

.subtitle{
    color:#ddd;
    margin-bottom:30px;
}

.info{
    background:rgba(255,255,255,.12);
    padding:20px;
    border-radius:20px;
    margin:20px 0;
    text-align:left;
    transition:.3s;
}

.info:hover{
    transform:translateY(-6px);
    box-shadow:0 0 20px #c084fc;
}

.info p{
    color:#fff;
    margin:10px 0;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    border-radius:50px;
    background:linear-gradient(90deg,#8b5cf6,#6d28d9);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #c084fc;
}

</style>

</head>

<body>

<div class="card">

<img src="profile.jpg" alt="รูปโปรไฟล์">

<h1>👤 ประวัติส่วนตัว</h1>

<p class="subtitle">My Profile</p>

<div class="info">

<p><strong>👨 ชื่อ :</strong> อัษฎา ปาคำวัง</p>

<p><strong>🎂 วันเกิด :</strong> 00 เดือน xxxx พ.ศ. xxxx</p>

<p><strong>🎓 กำลังศึกษา :</strong> วิทยาลัย.......................</p>

<p><strong>💻 ความสามารถ :</strong> HTML, CSS, JavaScript</p>

<p><strong>🎯 งานอดิเรก :</strong> เขียนโปรแกรม, เล่นเกม, ฟังเพลง</p>

<p><strong>🌟 เป้าหมาย :</strong> ต้องการเป็น Web Developer</p>

</div>

<a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>

</div>

</body>
</html>
