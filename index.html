<style>
    /* ================= ดาวพื้นหลัง ================= */

.stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:0;
}

/* ดาว */

.stars span{
    position:absolute;
    border-radius:50%;
    background:white;
    animation:twinkle 3s infinite ease-in-out;
}

/* ขนาดและตำแหน่ง */

.stars span:nth-child(1){top:6%;left:12%;width:2px;height:2px;animation-delay:.2s;}
.stars span:nth-child(2){top:15%;left:72%;width:4px;height:4px;animation-delay:1.5s;}
.stars span:nth-child(3){top:28%;left:30%;width:3px;height:3px;animation-delay:.7s;}
.stars span:nth-child(4){top:40%;left:90%;width:2px;height:2px;animation-delay:2s;}
.stars span:nth-child(5){top:52%;left:8%;width:5px;height:5px;animation-delay:1s;}
.stars span:nth-child(6){top:65%;left:42%;width:3px;height:3px;animation-delay:2.4s;}
.stars span:nth-child(7){top:18%;left:54%;width:2px;height:2px;animation-delay:.4s;}
.stars span:nth-child(8){top:82%;left:80%;width:4px;height:4px;animation-delay:2.8s;}
.stars span:nth-child(9){top:58%;left:25%;width:3px;height:3px;animation-delay:1.4s;}
.stars span:nth-child(10){top:36%;left:62%;width:2px;height:2px;animation-delay:1.9s;}
.stars span:nth-child(11){top:78%;left:67%;width:4px;height:4px;animation-delay:.6s;}
.stars span:nth-child(12){top:25%;left:5%;width:3px;height:3px;animation-delay:2.1s;}
.stars span:nth-child(13){top:12%;left:40%;width:2px;height:2px;animation-delay:1.1s;}
.stars span:nth-child(14){top:48%;left:50%;width:4px;height:4px;animation-delay:.9s;}
.stars span:nth-child(15){top:70%;left:92%;width:3px;height:3px;animation-delay:2.5s;}
.stars span:nth-child(16){top:88%;left:18%;width:2px;height:2px;animation-delay:1.8s;}
.stars span:nth-child(17){top:8%;left:88%;width:5px;height:5px;animation-delay:.3s;}
.stars span:nth-child(18){top:60%;left:73%;width:2px;height:2px;animation-delay:2.7s;}
.stars span:nth-child(19){top:45%;left:15%;width:4px;height:4px;animation-delay:1.3s;}
.stars span:nth-child(20){top:92%;left:58%;width:3px;height:3px;animation-delay:2.9s;}

/* กระพริบ */

@keyframes twinkle{

0%,100%{
opacity:.15;
transform:scale(.6);
box-shadow:
0 0 5px #fff,
0 0 10px #a855f7;
}

50%{
opacity:1;
transform:scale(1.8);
box-shadow:
0 0 15px white,
0 0 30px #c084fc,
0 0 50px #9333ea;
}

}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#3b0764,#7c3aed,#ffffff);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* วงกลมพื้นหลัง */

body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#a855f755;
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(60px);
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#ffffff33;
border-radius:50%;
bottom:-150px;
right:-120px;
filter:blur(70px);
}

/* กล่องหลัก */

.card{
    position:relative;
    z-index:10;

    width:430px;
    padding:45px;
    border-radius:30px;

    background:rgba(20,20,20,.45);
    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.2);

    box-shadow:
    0 15px 40px rgba(0,0,0,.6),
    0 0 30px rgba(168,85,247,.35);

    text-align:center;

    animation:show .9s ease;

/* รูปโปรไฟล์ */

.profile{
    width:180px;
height:180px;
margin:auto;
border-radius:50%;
overflow:hidden;

border:5px solid white;

box-shadow:
0 0 20px white,
0 0 45px #a855f7,
0 0 80px #6d28d9;

transition:.5s;

}

.profile:hover{

transform:scale(1.08);

box-shadow:
0 0 25px white,
0 0 60px #c084fc,
0 0 100px #9333ea;

}

.profile img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}


h1{
   margin-top:25px;
font-size:40px;
color:white;
text-shadow:
0 0 10px #a855f7,
0 0 20px #6d28d9;

}
    h1::after{
    content:"";
    display:block;
    width:120px;
    height:4px;
    margin:10px auto 0;
    border-radius:10px;
    background:linear-gradient(90deg,#fff,#c084fc,#7c3aed);
}

    h2{
    color:#fff;
    font-size:24px;
    margin:10px 0;
    font-weight:500;
}
    .welcome{
    color:#ffffff;
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    margin:12px 0;
    opacity:.8;
}

p{
    color:#ddd;
    margin-bottom:30px;
}

.menu{
    width:100%;
    display:grid;
    gap:15px;
}

.menu a{
   display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;

    text-decoration:none;
    padding:15px;
    border-radius:50px;

    background:linear-gradient(135deg,#7c3aed,#4c1d95);

    color:white;
    font-size:18px;
    font-weight:500;

    transition:.4s;

    box-shadow:0 8px 20px rgba(124,58,237,.45);
}

.menu a:hover{

background:linear-gradient(135deg,#ffffff,#e9d5ff);

color:#4c1d95;

transform:translateY(-6px) scale(1.03);

box-shadow:
0 15px 30px rgba(255,255,255,.3);

}

.footer{
    margin-top:30px;
color:#ddd;
letter-spacing:2px;
}
    /* Animation เปิดหน้าเว็บ */

@keyframes show{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
    
/* ================= ดาวตก ================= */

.shooting-stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
}

.shooting-stars span{
    position:absolute;
    width:180px;
    height:2px;
    background:linear-gradient(90deg,#fff,transparent);
    border-radius:50px;
    transform:rotate(-45deg);

    animation:shoot 4s linear infinite;
}

/* ตำแหน่งดาวตก */

.shooting-stars span:nth-child(1){
    top:10%;
    left:-20%;
    animation-delay:0s;
}

.shooting-stars span:nth-child(2){
    top:30%;
    left:-35%;
    animation-delay:2s;
}

.shooting-stars span:nth-child(3){
    top:60%;
    left:-25%;
    animation-delay:4s;
}

.shooting-stars span:nth-child(4){
    top:20%;
    left:-40%;
    animation-delay:6s;
}

/* Animation */

@keyframes shoot{

0%{
    transform:translate(0,0) rotate(-45deg);
    opacity:0;
}

10%{
    opacity:1;
}

100%{
    transform:translate(1400px,800px) rotate(-45deg);
    opacity:0;
}

}
    
</style>
