<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#3b0764,#7c3aed,#ffffff);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* วงกลมพื้นหลัง */

body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#a855f755;
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(60px);
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#ffffff33;
border-radius:50%;
bottom:-150px;
right:-120px;
filter:blur(70px);
}

/* กล่องหลัก */

.card{
    position:relative;
z-index:1;
width:430px;
padding:45px;
border-radius:30px;

background:rgba(20,20,20,.45);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 15px 40px rgba(0,0,0,.5),
0 0 30px rgba(168,85,247,.4);

text-align:center;
}

/* รูปโปรไฟล์ */

.profile{
    width:180px;
height:180px;
margin:auto;
border-radius:50%;
overflow:hidden;

border:5px solid white;

box-shadow:
0 0 20px white,
0 0 45px #a855f7,
0 0 80px #6d28d9;

transition:.5s;

}

.profile:hover{

transform:scale(1.08);

box-shadow:
0 0 25px white,
0 0 60px #c084fc,
0 0 100px #9333ea;

}

.profile img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

.profile:hover{
    transform:scale(1.05);
}

h1{
   margin-top:25px;
font-size:40px;
color:white;
text-shadow:
0 0 10px #a855f7,
0 0 20px #6d28d9;

}

p{

color:#dddddd;

}
p{
    color:white;
    margin-bottom:30px;
}

.menu{
    width:100%;
    display:grid;
    gap:15px;
}

.menu a{
    text-decoration:none;

padding:15px;

border-radius:50px;

background:linear-gradient(135deg,#7c3aed,#4c1d95);

color:white;

font-size:18px;

font-weight:500;

transition:.4s;

box-shadow:
0 8px 20px rgba(124,58,237,.45);

}

.menu a:hover{

background:linear-gradient(135deg,#ffffff,#e9d5ff);

color:#4c1d95;

transform:translateY(-6px) scale(1.03);

box-shadow:
0 15px 30px rgba(255,255,255,.3);

}

.footer{
    margin-top:30px;
color:#ddd;
letter-spacing:2px;
}

</style>

</head>

<body>

<div class="card">

<div class="profile">

<img src="S__4431875.jpg" alt="Profile">

</div>
