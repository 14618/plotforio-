<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ติดต่อ |ณรงฤทธิ์ รักไทย</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6d28d9,#7c3aed,#8b5cf6);
    padding:40px;
}

.card{
    width:700px;
    max-width:100%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

h1{
    color:white;
    font-size:42px;
}

.subtitle{
    color:#eee;
    margin:15px 0 35px;
}

.contact-box{
    background:rgba(255,255,255,.12);
    border-radius:20px;
    padding:20px;
    margin:20px 0;
    transition:.3s;
}

.contact-box:hover{
    transform:translateY(-8px);
    box-shadow:0 0 20px #c084fc;
}

.contact-box h2{
    color:white;
    margin-bottom:10px;
}

.contact-box p{
    color:#eee;
    font-size:18px;
}

.contact-box a{
    color:#fff;
    text-decoration:none;
}

.contact-box a:hover{
    color:#f3e8ff;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    border-radius:50px;
    background:linear-gradient(90deg,#8b5cf6,#6d28d9);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #c084fc;
}

</style>

</head>

<body>

<div class="card">

<h1>📞 ติดต่อฉัน</h1>

<p class="subtitle">Contact Me</p>

<div class="contact-box">
    <h2>📧 Email</h2>
    <p>14618@phanthong.ac.th</p>
</div>

<div class="contact-box">
    <h2>📱 โทรศัพท์</h2>
    <p>08X-XXX-XXXX</p>
</div>

<div class="contact-box">
    <h2>🌐 Facebook</h2>
    <p><a href="https://facebook.com/" target="_blank">Facebook ของฉัน</a></p>
</div>

<div class="contact-box">
    <h2>📷 Instagram</h2>
    <p><a href="https://instagram.com/" target="_blank">@yourname</a></p>
</div>

<a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>

</div>

</body>
</html>
