<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
overflow:hidden;
}

/* วงกลมพื้นหลัง */

body::before{
content:"";
position:absolute;
width:320px;
height:320px;
background:#ffffff55;
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(40px);
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:#6a5af955;
border-radius:50%;
bottom:-120px;
right:-120px;
filter:blur(50px);
}

/* กล่องหลัก */

.card{

position:relative;
z-index:1;

width:420px;

padding:45px;

border-radius:30px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.3);

box-shadow:
0 25px 50px rgba(0,0,0,.25);

text-align:center;

}

/* รูป */

.profile{

width:180px;
height:180px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:6px solid white;

box-shadow:
0 0 35px #fff,
0 0 60px #00d4ff;

transition:.4s;

}

.profile img{

width:100%;
height:100%;
object-fit:cover;

}

.profile:hover{

transform:scale(1.08) rotate(3deg);

}

h1{

margin-top:25px;
color:white;
font-size:38px;
letter-spacing:2px;

}

p{

color:#eef;
margin:12px 0 30px;

}

/* เมนู */

.menu{

display:grid;

gap:15px;

}

.menu a{

text-decoration:none;

padding:15px;

border-radius:50px;

background:rgba(255,255,255,.22);

color:white;

font-size:18px;

font-weight:500;

backdrop-filter:blur(10px);

transition:.35s;

box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.menu a:hover{

background:white;

color:#0099ff;

transform:translateY(-6px);

box-shadow:0 15px 30px rgba(0,0,0,.3);

}

.footer{

margin-top:30px;
font-size:14px;
color:white;

}

</style>

</head>

<body>

<div class="card">

<div class="profile">

<img src="profile.jpg">

</div>

<h1>PORTFOLIO</h1>

<p>แฟ้มสะสมผลงาน นักเรียนชั้นมัธยมศึกษาปีที่ 6</p>

</div>

<div class="footer">

© 2026 My Portfolio

</div>

</div>

</body>
