<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    overflow:hidden;
}

/* วงกลมพื้นหลัง */

body::before{
    content:"";
    position:fixed;
    width:320px;
    height:320px;
    background:#ffffff55;
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(40px);
}

body::after{
    content:"";
    position:fixed;
    width:350px;
    height:350px;
    background:#6a5af955;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(50px);
}

/* กล่องหลัก */

.card{
    position:relative;
    z-index:2;

    width:420px;
    max-width:90%;

    padding:40px;

    display:flex;
    flex-direction:column;
    align-items:center;

    border-radius:30px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.3);

    box-shadow:0 25px 50px rgba(0,0,0,.25);

    text-align:center;
}

/* รูปโปรไฟล์ */

.profile{
    width:180px;
    height:180px;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:0 auto 25px;

    border-radius:50%;
    overflow:hidden;

    border:6px solid white;

    box-shadow:
        0 0 35px #fff,
        0 0 60px #00d4ff;

    transition:.4s;
}

.profile img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

.profile:hover{
    transform:scale(1.05);
}

h1{
    color:white;
    font-size:38px;
    margin-bottom:10px;
}

p{
    color:white;
    margin-bottom:30px;
}

.menu{
    width:100%;
    display:grid;
    gap:15px;
}

.menu a{
    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    padding:15px;

    border-radius:50px;

    background:rgba(255,255,255,.22);

    color:white;

    font-size:18px;

    font-weight:500;

    backdrop-filter:blur(10px);

    transition:.3s;

    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.menu a:hover{
    background:white;
    color:#0099ff;
    transform:translateY(-5px);
}

.footer{
    margin-top:30px;
    color:white;
    font-weight:500;
}

</style>

</head>

<body>

<div class="card">

<div class="profile">

<img src="profile.jpg">

</div>

<h1>PORTFOLIO</h1>

<p>แฟ้มสะสมผลงาน นักเรียนชั้นมัธยมศึกษาปีที่ 6</p>

</div>

<div class="footer">

</div>

</div>

</body>
