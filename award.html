<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ผลงาน | ณรงฤทธิ์ รักไทย</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6d28d9,#7c3aed,#8b5cf6);
    padding:40px;
}

.card{
    width:900px;
    max-width:100%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

h1{
    color:white;
    font-size:42px;
}

.subtitle{
    color:#eee;
    margin:15px 0 40px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.item{
    background:rgba(255,255,255,.12);
    border-radius:20px;
    overflow:hidden;
    transition:.3s;
}

.item:hover{
    transform:translateY(-8px);
    box-shadow:0 0 20px #c084fc;
}

.item img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.item h2{
    color:white;
    margin:15px 0 8px;
}

.item p{
    color:#eee;
    padding:0 15px 20px;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:14px 35px;
    border-radius:50px;
    background:linear-gradient(90deg,#8b5cf6,#6d28d9);
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    box-shadow:0 0 20px #c084fc;
}

</style>

</head>

<body>

<div class="card">

<h1>🏆 ผลงานของฉัน</h1>

<p class="subtitle">My Projects & Achievements</p>

<div class="gallery">

<div class="item">
<img src="S__5668870.jpg" alt="ผลงานที่ 1">
<h2>Portfolio Website</h2>
<p>กิจกรรมงานภาษาไทย/p>
</div>

<div class="item">
<img src="S__5668868.jpg" alt="ผลงานที่ 2">
<h2>Certificate</h2>
<p>กิจกรรมงานโรคHIV</p>
</div>

<div class="item">
<img src="S__5668871.jpg" alt="ผลงานที่ 3">
<h2>Project</h2>
<p>เก็บขยะ</p>
</div>

</div>

<a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>

</div>

</body>
</html>
