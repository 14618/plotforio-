<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา | My Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#6d28d9,#7c3aed,#8b5cf6);
            color:white;
        }

        .card{
            width:750px;
            max-width:90%;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(20px);
            border-radius:30px;
            padding:40px;
            text-align:center;
            box-shadow:0 20px 40px rgba(0,0,0,.3);
            border:1px solid rgba(255,255,255,.2);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
        }

        .subtitle{
            color:#ddd;
            margin-bottom:35px;
        }

        .edu-box{
            background:rgba(255,255,255,.12);
            border-radius:20px;
            padding:20px;
            margin:20px 0;
            transition:.3s;
        }

        .edu-box:hover{
            transform:translateY(-8px);
            box-shadow:0 0 25px #c084fc;
        }

        .edu-box h2{
            margin-bottom:8px;
            color:#fff;
        }

        .edu-box span{
            color:#e9d5ff;
            font-size:15px;
            font-weight:bold;
        }

        .edu-box p{
            margin-top:12px;
            color:#eee;
            line-height:1.8;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:14px 35px;
            border-radius:50px;
            background:linear-gradient(90deg,#8b5cf6,#6d28d9);
            color:white;
            text-decoration:none;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px #c084fc;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🎓 ประวัติการศึกษา</h1>
    <p class="subtitle">Education Journey</p>

    <div class="edu-box">
        <h2>📚 ระดับประถมศึกษา</h2>
        <span>ปี ........ - ........</span>
        <p>โรงเรียน ....................................</p>
    </div>

    <div class="edu-box">
        <h2>🏫 ระดับมัธยมศึกษาตอนต้น</h2>
        <span>มัธยมศึกษาปีที่ 1 - 3</span>
        <p>โรงเรียนพานทอง</p>
    </div>

    <div class="edu-box">
        <h2>🎓 ระดับมัธยมศึกษาตอนปลาย</h2>
        <span>มัธยมศึกษาปีที่ 4 - 6</span>
        <p>โรงเรียนพานทอง</p>
    </div>

    <a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>

</div>

</body>
</html>
